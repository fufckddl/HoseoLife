# Hoseolife.kro.kr 웹사이트 + API 통합 Nginx 설정 (Universal Links 지원)
# /etc/nginx/conf.d/hoseolife.conf

server {
    listen 80;
    server_name hoseolife.kro.kr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name hoseolife.kro.kr;

    # SSL 인증서 설정
    ssl_certificate /etc/letsencrypt/live/hoseolife.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoseolife.kro.kr/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 클라이언트 최대 크기 (이미지 업로드를 위해 증가)
    client_max_body_size 30M;

    # AASA 파일 서빙 (리다이렉트 금지, MIME 고정)
    location = /apple-app-site-association {
        default_type application/json;
        try_files /apple-app-site-association =404;
    }
    
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        try_files /.well-known/apple-app-site-association =404;
    }

    # Android assetlinks 파일 서빙
    location = /.well-known/assetlinks.json {
        default_type application/json;
        try_files /.well-known/assetlinks.json =404;
    }

    # WebSocket 프록시 설정 (채팅 기능)
    location /chat/ws/ {
        proxy_pass http://localhost:5000/chat/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 연결 유지
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
        
        # 버퍼링 비활성화
        proxy_buffering off;
        proxy_cache off;
    }

    # API 프록시 설정 (백엔드 API)
    location /api/ {
        proxy_pass http://localhost:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 웹사이트 프록시 설정 (/web 경로)
    location /web/ {
        alias /var/www/hoseolife.kro.kr/;
        try_files $uri $uri/ /web/index.html;
        
        # 정적 파일 캐싱
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Universal Links 대상 경로 (/posts/{id}, /post/{id})
    location ~ ^/(posts|post)/([0-9]+)(/.*)?$ {
        # 앱이 설치된 경우 앱으로 라우팅, 미설치 시 웹으로 폴백
        try_files $uri @web_fallback;
    }

    # 웹 폴백 (앱이 설치되지 않은 경우)
    location @web_fallback {
        rewrite ^/(posts|post)/([0-9]+)(/.*)?$ /web/posts/$2 last;
    }

    # 루트 경로는 API로 리다이렉트 (기존 앱 호환성)
    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 에러 페이지
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
