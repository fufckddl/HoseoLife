# HTTP to HTTPS 리다이렉션
server {
    listen 80;
    server_name hoseolife.kro.kr;
    return 301 https://$server_name$request_uri;
}

# HTTPS 서버
server {
    listen 443 ssl;
    http2 on;
    server_name hoseolife.kro.kr;

    ssl_certificate     /etc/letsencrypt/live/hoseolife.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoseolife.kro.kr/privkey.pem;

    # 프로토콜
    ssl_protocols TLSv1.2 TLSv1.3;

    # 암호군/곡선: 기본값 사용 (라인 삭제)
    # ssl_ciphers ...           <- 삭제
    # ssl_ecdh_curve secp384r1; <- 삭제

    # 세션/티켓: 기본값 유지 권장
    # ssl_session_tickets off;  <- 우선 삭제(기본)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP Stapling: resolver 추가 + 신뢰 체인 파일 정확히 지정
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/hoseolife.kro.kr/fullchain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 30M;

    # WebSocket 설정
    location /chat/ws/ {
        proxy_pass http://localhost:5000/chat/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;

        proxy_buffering off;
        proxy_cache off;

        access_log /var/log/nginx/websocket_access.log;
        error_log  /var/log/nginx/websocket_error.log;
    }

    # API 프록시 설정 (백엔드 API)
    location /api/ {
        proxy_pass http://localhost:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;
        
        access_log /var/log/nginx/api_access.log;
        error_log  /var/log/nginx/api_error.log;
    }

    # /web을 /web/로 리다이렉트
    location = /web {
        return 301 $scheme://$host/web/;
    }

    # 웹사이트 설정 (/web 경로)
    location /web/ {
        alias /var/www/hoseolife.kro.kr/;
        try_files $uri $uri/ /web/index.html;
        
        # 정적 파일 캐싱
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        access_log /var/log/nginx/web_access.log;
        error_log  /var/log/nginx/web_error.log;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;
        access_log /var/log/nginx/api_access.log;
        error_log  /var/log/nginx/api_error.log;
    }
}
