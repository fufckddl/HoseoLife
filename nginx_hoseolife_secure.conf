# 강화된 보안 설정이 포함된 Nginx 설정
# /etc/nginx/sites-available/hoseolife

# 의심스러운 IP 차단
map $remote_addr $blocked_ip {
    default 0;
    "185.244.104.2" 1;
    "65.49.1.152" 1;
    "170.64.223.58" 1;
    "45.156.129.179" 1;
    "45.156.129.177" 1;
}

# HTTP to HTTPS 리다이렉트
server {
    listen 80;
    server_name hoseolife.kro.kr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name hoseolife.kro.kr;

    # 차단된 IP 접근 거부
    if ($blocked_ip) {
        return 444;
    }

    # SSL 인증서 설정
    ssl_certificate /etc/letsencrypt/live/hoseolife.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoseolife.kro.kr/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 강화된 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:;" always;

    # 클라이언트 최대 크기
    client_max_body_size 30M;

    # 해킹 시도 차단 - Git 저장소 접근
    location ~ ^/\.git {
        deny all;
        return 444;
    }

    # 해킹 시도 차단 - JasperServer
    location ~ ^/(jasperserver|jasperserver-pro|jasperserverTest) {
        deny all;
        return 444;
    }

    # 해킹 시도 차단 - GeoServer
    location ~ ^/(geoserver|geoserver-pro) {
        deny all;
        return 444;
    }

    # 해킹 시도 차단 - 관리자 페이지
    location ~ ^/(admin|administrator|wp-admin|phpmyadmin|mysql|management) {
        deny all;
        return 444;
    }

    # 해킹 시도 차단 - 일반적인 취약점 경로
    location ~ ^/(\.env|\.htaccess|\.htpasswd|config\.php|wp-config\.php) {
        deny all;
        return 444;
    }

    # WebDAV 메서드 차단
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }

    # 의심스러운 User-Agent 차단
    if ($http_user_agent ~* (bot|crawler|spider|scraper|scanner|nikto|sqlmap|nmap)) {
        return 403;
    }

    # WebSocket 프록시 설정
    location /chat/ws/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
        proxy_buffering off;
        proxy_cache off;
        
        access_log /var/log/nginx/websocket_access.log;
        error_log /var/log/nginx/websocket_error.log;
    }

    # API 프록시 설정
    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;
        
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log;
    }

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 에러 페이지
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}


